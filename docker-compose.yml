services:
  localstack:
    image: localstack/localstack:3.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - DEBUG=0
      - LS_LOG=warn
    volumes:
      - "./volume:/var/lib/localstack"
      # 起動完了後にバケットを自動作成（awslocal はLocalStack同梱）
      - "./infrastructure/localstack/init:/etc/localstack/init/ready.d"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-p@ssw0rd}
      - POSTGRES_DB=${POSTGRES_DB:-HANBAI}
    volumes:
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  app:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    restart: unless-stopped
    ports:
      - "5153:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-HANBAI};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-p@ssw0rd};
      - AWS__ServiceURL=http://localstack:4566
      - AWS__BucketName=order-exports
      - ASPNETCORE_URLS=http://+:8080
      - AllowedOrigins__0=http://localhost:5173
      - AllowedOrigins__1=http://localhost:8094
      - AllowedOrigins__2=https://order-rag.ykts.net
      - AllowedOrigins__3=https://winforms.ykts.net
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  agent:
    build:
      context: ./src/Agent
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  postgres_data:
